name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cmdr
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: cmdr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      env:
        CMDR_POSTGRES_URL: postgres://cmdr:test_password@127.0.0.1:5432/cmdr_test?sslmode=disable
        CMDR_AGENTGATEWAY_URL: http://localhost:8080
      run: make test

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out

        #  lint:
        #    name: Lint
        #    runs-on: ubuntu-latest
        #
        #    steps:
        #    - name: Checkout code
        #      uses: actions/checkout@v4
        #
        #    - name: Set up Go
        #      uses: actions/setup-go@v5
        #      with:
        #        go-version-file: go.mod
        #        cache: true
        #
        #    - name: Run golangci-lint
        #      uses: golangci/golangci-lint-action@v6
        #      with:
        #        version: latest

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build binary
      run: make build

    - name: Build Docker image
      run: docker build -t cmdr:test .
