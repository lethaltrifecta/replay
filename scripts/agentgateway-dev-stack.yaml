# yaml-language-server: $schema=https://agentgateway.dev/schema/config
#
# agentgateway config for docker-compose dev stack.
# LLM proxy on :4000 (via llm.models), MCP proxy on :3003.
# All hostnames use docker-compose service names.

config:
  tracing:
    otlpEndpoint: http://cmdr:4317
    randomSampling: true

llm:
  models:
  - name: "*"
    provider: openAI
    params:
      apiKey: "$OPENAI_API_KEY"

binds:
- port: 3003
  listeners:
  - name: mcp
    routes:
    - policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          - x-freeze-trace-id
          exposeHeaders:
          - Mcp-Session-Id
      backends:
      - mcp:
          targets:
          - name: freeze-mcp
            mcp:
              host: http://freeze-mcp:9090/mcp/
