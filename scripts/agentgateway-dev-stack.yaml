# yaml-language-server: $schema=https://agentgateway.dev/schema/config
#
# agentgateway config for docker-compose dev stack.
# LLM proxy on :3001, MCP proxy on :3003.
# All hostnames use docker-compose service names.

config:
  tracing:
    otlpEndpoint: http://cmdr:4317
    randomSampling: true
    fields:
      add:
        gen_ai.system: 'llm.provider'
        gen_ai.prompt: 'flattenRecursive(llm.prompt)'
        gen_ai.completion: 'flattenRecursive(llm.completion.map(c, {"role":"assistant", "content": c}))'

binds:
- port: 3001
  listeners:
  - name: llm
    protocol: HTTP
    routes:
    - name: llm
      backends:
      - ai:
          name: mock-openai
          hostOverride: mock-llm:18080
          pathOverride: /v1/chat/completions
          provider:
            openAI:
              model: mock-model
          policies:
            ai:
              routes:
                /v1/chat/completions: completions
                "*": passthrough
- port: 3003
  listeners:
  - name: mcp
    routes:
    - policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          - x-freeze-trace-id
          exposeHeaders:
          - Mcp-Session-Id
      backends:
      - mcp:
          targets:
          - name: freeze-mcp
            mcp:
              host: http://freeze-mcp:9090/mcp/
