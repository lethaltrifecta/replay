# yaml-language-server: $schema=https://agentgateway.dev/schema/config
binds:
- port: 3002
  listeners:
  - name: llm
    protocol: HTTP
    routes:
    - name: llm
      backends:
      - ai:
          name: mock-openai-toolloop
          hostOverride: 127.0.0.1:18081
          pathOverride: /v1/chat/completions
          provider:
            openAI:
              model: mock-toolloop-model
          policies:
            ai:
              routes:
                /v1/chat/completions: completions
                "*": passthrough
