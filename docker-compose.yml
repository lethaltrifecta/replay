services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: cmdr-postgres
    environment:
      POSTGRES_USER: cmdr
      POSTGRES_PASSWORD: cmdr_dev_password
      POSTGRES_DB: cmdr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmdr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger (for OTEL trace storage and visualization - optional)
  # Note: Jaeger uses different OTLP ports to avoid conflict with CMDR
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: cmdr-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "6831:6831/udp"  # Jaeger agent
      - "14250:14250"  # Jaeger collector gRPC
      # Note: OTLP ports (4317/4318) NOT exposed - CMDR uses these

  # CMDR service
  cmdr:
    build: .
    container_name: cmdr-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CMDR_API_PORT: 8080
      CMDR_LOG_LEVEL: debug
      CMDR_POSTGRES_URL: postgres://cmdr:cmdr_dev_password@postgres:5432/cmdr?sslmode=disable
      CMDR_AGENTGATEWAY_URL: http://host.docker.internal:8080
      CMDR_OTLP_GRPC_ENDPOINT: 0.0.0.0:4317
      CMDR_OTLP_HTTP_ENDPOINT: 0.0.0.0:4318
      CMDR_FREEZETOOLS_PORT: 9090
    ports:
      - "8080:8080"    # HTTP API
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "${CMDR_FREEZETOOLS_HOST_PORT:-9090}:9090"    # Freeze-Tools MCP

  replay-web:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        REPLAY_API_ORIGIN: http://cmdr:8080
    container_name: replay-web
    depends_on:
      - cmdr
    environment:
      REPLAY_API_ORIGIN: http://cmdr:8080
      NEXT_PUBLIC_REPLAY_API_BASE: /api/v1
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"

volumes:
  postgres_data:
